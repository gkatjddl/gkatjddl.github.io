<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>애니메이션 연습</title>
  <style>
  .background{
    background: purple;
    width: 300px;
    transition: color 1s,background 1s;
  }
  .background:hover{
    background: violet;
    color: white;
    
  }
  </style>
</head>
<body>
  <p style="transform: rotate(10deg); width: 100px;">안녕</p>
  <div class="background">글자</div>
  
</body>
</html>
